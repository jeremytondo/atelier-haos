name: Atelier HAOS
version: "0.1.0"
slug: atelier_haos
description: >-
  Atelier-based SSH development environment for editing and managing Home Assistant configurations.
url: https://github.com/jeremytondo/atelier-haos
startup: services
init: false
host_network: false
arch:
  - amd64
  - aarch64
ports:
  2222/tcp: 2222
ports_description:
  2222/tcp: SSH access to the Atelier HAOS shell
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
options:
  authorized_keys: []
  log_level: info
schema:
  authorized_keys:
    - str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
